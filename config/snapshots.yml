# Configuracion de snapshots congelados y destino S3.
# TODO el pipeline y la demo leen un snapshot ID inmutable desde aqui.
# Regla de oro del proyecto: reproducibilidad por snapshots; nunca API en vivo.

aws:
  bucket: navicast-cl-pr2026        # nombre global-unico de S3
  region: us-east-1                  # <-- region del bucket
  profile: null                     # null = cadena de credenciales por defecto de boto3

snapshots:
  # Snapshot para el BENCHMARK Big Data (Sprint 1):
  # 1 archivo diario NACIONAL de NOAA, SIN recortar -> ~1.5-3 GB descomprimido.
  # Es geografia-agnostico: no depende de la decision abierta #1.
  snap_2024-01-15_noaa_national_v1:
    description: "1 dia nacional NOAA (benchmark pandas vs Polars vs DuckDB)"
    source: noaa
    kind: benchmark
    dates: ["2024-01-15"]
    bbox: null            # nacional, sin clip
    bronze_format: parquet
    schema_version: 1

  # Snapshot SEMANA para forzar el limite de pandas (Sprint 1, escala mayor):
  # 7 dias nacionales (~50 M filas). pandas concatena todo en RAM -> muchos GB / OOM,
  # mientras DuckDB/Polars leen el directorio out-of-core y se mantienen planos.
  snap_2024-01-w3_noaa_national_v1:
    description: "1 semana nacional NOAA (estresar pandas hasta OOM)"
    source: noaa
    kind: benchmark
    dates: ["2024-01-15", "2024-01-16", "2024-01-17", "2024-01-18", "2024-01-19", "2024-01-20", "2024-01-21"]
    bbox: null
    bronze_format: parquet
    schema_version: 1

  # Snapshot SILVER (modelado): semana recortada a LA/Long Beach. Lee del Bronze
  # nacional (from_bronze) y se congela limpio en S3. Decision #1: NOAA LA/LB.
  snap_2024-01-w3_laxlb_v1:
    description: "Silver LA/Long Beach, semana 3 ene 2024 (modelado ETA)"
    source: noaa
    kind: model
    from_bronze: snap_2024-01-w3_noaa_national_v1
    bbox: {lon_min: -118.6, lon_max: -117.8, lat_min: 33.4, lat_max: 34.0}
    dates: ["2024-01-15", "2024-01-16", "2024-01-17", "2024-01-18", "2024-01-19", "2024-01-20", "2024-01-21"]
    bronze_format: parquet
    schema_version: 1

  # Snapshot CHILE (stretch): grabado en vivo via aisstream.io (no hay archivo historico).
  # Valparaiso + San Antonio. Se graba directo a Bronze; el clip = el propio bbox de grabacion.
  snap_chile_valpo_v1:
    description: "Chile costa central (Valparaiso+San Antonio), grabado aisstream"
    source: aisstream
    kind: model
    from_bronze: snap_chile_valpo_v1
    bbox: {lon_min: -72.5, lon_max: -71.0, lat_min: -34.5, lat_max: -32.5}
    bronze_format: parquet
    schema_version: 1
