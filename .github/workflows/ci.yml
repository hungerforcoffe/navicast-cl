name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (core + test deps; sin el stack pesado)
        run: |
          python -m pip install -U pip
          pip install -e .
          pip install pytest pandas numpy h3
      - name: Run tests
        run: pytest -q
